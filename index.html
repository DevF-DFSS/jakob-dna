:root {
  --bg: #0a0a0c;
  --surface: #111116;
  --surface-2: #18181f;
  --surface-3: #1f1f28;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.14);
  --text: #e8e6e0;
  --text-muted: #7a7870;
  --text-faint: #3d3c3a;
  --jakob: #3dd6c0;
  --jakob-dim: rgba(61,214,192,0.12);
  --jakob-glow: rgba(61,214,192,0.25);
  --jesse: #f0b429;
  --jesse-dim: rgba(240,180,41,0.12);
  --jesse-glow: rgba(240,180,41,0.25);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --font-body: 'Space Grotesk', sans-serif;
  --font-mono: 'Space Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(61,214,192,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 80% 85%, rgba(240,180,41,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 1;
}
.wrap { position: relative; z-index: 2; }
#auth-screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2rem;
}
.portal-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
}
.logo-trident {
  font-size: 3rem;
  line-height: 1;
  filter: drop-shadow(0 0 20px rgba(61,214,192,0.5));
  animation: trident-pulse 3s ease-in-out infinite;
}
@keyframes trident-pulse {
  0%, 100% { filter: drop-shadow(0 0 20px rgba(61,214,192,0.5)); }
  50% { filter: drop-shadow(0 0 40px rgba(61,214,192,0.8)); }
}
.logo-title {
  font-family: var(--font-mono);
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.logo-sub {
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-family: var(--font-mono);
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-xl);
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
}
